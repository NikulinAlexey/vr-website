<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Мой VR-сайт с HTML внутри сферы</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      /* Инструкция для пользователя (показывается только на компьютере) */
      .instruction {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
        font-size: 14px;
        pointer-events: none;
        z-index: 10;
        font-family: monospace;
      }
      @media (max-width: 768px) {
        .instruction {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="instruction">
      🖱️ На компьютере: тяни мышкой чтобы осмотреться. На телефоне: нажми на
      очки в углу → вставь в Cardboard.
    </div>

    <!-- Подключаем A-Frame (последняя стабильная версия) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- Дополнительный компонент для HTML-табличек (CSS2D) -->
    <script src="https://unpkg.com/aframe-html-component@0.2.0/dist/aframe-html-component.min.js"></script>

    <a-scene>
      <!-- ========== 1. ФОН: текстура или видео (замените на своё 360-видео) ========== -->
      <!-- Вариант А: просто цветной фон -->
      <a-sky color="#ECECEC"></a-sky>

      <!-- Вариант Б: 360-текстура (раскомментируйте и укажите свой файл) -->
      <!-- <a-sky src="moja-panorama.jpg" rotation="0 -90 0"></a-sky> -->

      <!-- Вариант В: 360-видео (раскомментируйте и укажите свой файл) -->
      <!-- <a-videosphere src="moje-360-video.mp4" rotation="0 -90 0"></a-videosphere> -->

      <!-- ========== 2. 3D-ОБЪЕКТЫ (для примера) ========== -->
      <a-box
        position="-2 1 -3"
        rotation="0 45 0"
        color="#4CC3D9"
        shadow
      ></a-box>
      <a-sphere
        position="0 1.5 -4"
        radius="1.2"
        color="#EF2D5E"
        shadow
      ></a-sphere>
      <a-cylinder
        position="2 1 -3"
        radius="0.8"
        height="1.8"
        color="#FFC65D"
        shadow
      ></a-cylinder>
      <a-torus-knot
        position="0 2 -6"
        radius="0.8"
        tube="0.2"
        color="#7BC8A4"
        shadow
      ></a-torus-knot>

      <!-- ========== 3. HTML-ЭЛЕМЕНТЫ ВНУТРИ 3D-СЦЕНЫ (таблички) ========== -->
      <!-- Табличка 1: текстовая -->
      <a-entity
        html-panel="content: <div style='background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-family: sans-serif; text-align: center;'><h3>🌟 Привет, я внутри сферы!</h3><p>Это обычный HTML внутри VR</p><button id='btn1' style='margin-top: 10px; padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer;'>Нажми меня</button></div>;"
        position="-2 2.5 -2"
        width="3"
        height="2"
        look-at="#camera"
      >
      </a-entity>

      <!-- Табличка 2: просто текст -->
      <a-entity
        html-panel="content: <div style='background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 18px;'>⚡ Карточка сотрудника: Иван Иванов</div>;"
        position="2 1.8 -3"
        width="2.5"
        height="1.2"
        look-at="#camera"
      >
      </a-entity>

      <!-- Табличка 3: кнопка для перехода -->
      <a-entity
        html-panel="content: <div style='background: #ff5722; padding: 12px 24px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; text-align: center;' id='gotoBtn'>🚀 Перейти на сайт</div>;"
        position="0 1.5 -6"
        width="2"
        height="1"
        look-at="#camera"
      >
      </a-entity>

      <!-- ========== 4. ОСВЕЩЕНИЕ ========== -->
      <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
      <a-light
        type="directional"
        color="#ffffff"
        intensity="0.8"
        position="2 5 3"
      ></a-light>
      <a-light type="point" intensity="0.5" position="1 2 2"></a-light>

      <!-- ========== 5. КАМЕРА С УПРАВЛЕНИЕМ ========== -->
      <!-- look-controls: позволяет вращать головой (на телефоне — гироскоп, на ПК — мышь) -->
      <!-- wasd-controls: движение по сцене (на ПК клавиши WASD) -->
      <a-entity
        camera
        look-controls
        wasd-controls
        position="0 1.6 0"
      ></a-entity>

      <!-- Кнопка для входа в VR (на телефоне будет видна иконка очков) -->
      <a-entity id="vrButton" position="0 0 0"></a-entity>
    </a-scene>

    <!-- ========== 6. СКРИПТ ДЛЯ ОБРАБОТКИ КЛИКОВ ПО HTML-КНОПКАМ (ВНУТРИ 3D) ========== -->
    <script>
      // Ждём загрузки сцены
      window.addEventListener("load", () => {
        // Функция для поиска кнопок внутри HTML-панелей (так как они создаются динамически)
        setTimeout(() => {
          // Кнопка "Нажми меня"
          const btn1 = document.getElementById("btn1");
          if (btn1) {
            btn1.addEventListener("click", () => {
              alert("Привет из HTML-кнопки внутри 3D!");
            });
          }

          // Кнопка "Перейти на сайт"
          const gotoBtn = document.getElementById("gotoBtn");
          if (gotoBtn) {
            gotoBtn.addEventListener("click", () => {
              window.open("https://example.com", "_blank");
            });
          }
        }, 500); // Небольшая задержка, чтобы DOM успел отрисовать HTML-панели
      });
    </script>
  </body>
</html>
